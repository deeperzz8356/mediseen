apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

def signingCredentialsFile = rootProject.file('../.keystore-credentials.local')
def signingPropertiesFile = rootProject.file('signing.properties')

def readCredential = { File file, String prefix ->
    if (!file.exists()) {
        return ''
    }

    def line = file.readLines().find { it.startsWith("${prefix}:") }
    line ? line.split(':', 2)[1].trim() : ''
}

def readProperty = { File file, String key ->
    if (!file.exists()) {
        return ''
    }

    def properties = new java.util.Properties()
    file.withInputStream { input -> properties.load(input) }
    def value = properties.getProperty(key)?.trim()
    if (!value || value.startsWith('${')) {
        return ''
    }

    value
}

def resolveSigningValue = { String... values ->
    values.find { it?.trim() && !it.trim().startsWith('${') }?.trim() ?: ''
}

def localStorePassword = readCredential(signingCredentialsFile, 'Keystore Password')
def localKeyPassword = readCredential(signingCredentialsFile, 'Key Password')

android {
    namespace = "com.mediseen.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId = "com.mediseen.app"
        minSdk = rootProject.ext.minSdkVersion
        targetSdk = rootProject.ext.targetSdkVersion
        versionCode = 1
        versionName = "1.0.0"
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile rootProject.file('keystore/mediseen.keystore')
            storePassword resolveSigningValue(System.getenv('KEYSTORE_PASSWORD'), readProperty(signingPropertiesFile, 'storePassword'), localStorePassword)
            keyAlias resolveSigningValue(System.getenv('KEY_ALIAS'), readProperty(signingPropertiesFile, 'keyAlias'), 'mediseen-key')
            keyPassword resolveSigningValue(System.getenv('KEY_PASSWORD'), System.getenv('KEYSTORE_PASSWORD'), readProperty(signingPropertiesFile, 'keyPassword'), localKeyPassword, localStorePassword)
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    lint {
        checkReleaseBuilds = false
        abortOnError = false
    }
    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += ['-Xskip-metadata-version-check']
    }
    buildFeatures {
        compose = true
    }
    // composeOptions {
    //     kotlinCompilerExtensionVersion = composeCompilerVersion
    // }
    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled = false
            shrinkResources = false
            proguardFiles(getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro')
        }
    }
}

repositories {
    flatDir{
        dirs = ['../capacitor-cordova-android-plugins/src/main/libs', 'libs']
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.google.android.material:material:1.12.0"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
    implementation "androidx.activity:activity-compose:$androidxActivityVersion"
    implementation "androidx.compose.ui:ui:$composeUiVersion"
    implementation "androidx.compose.material3:material3:$composeMaterial3Version"
    implementation "androidx.compose.material3:material3-window-size-class:$composeMaterial3Version"
    implementation "androidx.compose.ui:ui-tooling-preview:$composeUiVersion"
    implementation "androidx.compose.foundation:foundation:$composeUiVersion"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:$lifecycleRuntimeKtxVersion"
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:$lifecycleViewModelComposeVersion"
    implementation "androidx.navigation:navigation-compose:$navigationComposeVersion"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$coroutinesAndroidVersion"
    implementation "com.google.firebase:firebase-auth:$firebaseAuthVersion"
    implementation "com.google.android.gms:play-services-auth:$playServicesAuthVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    
    // Health Connect Integration
    implementation "androidx.health.connect:connect-client:1.1.0-alpha11"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
